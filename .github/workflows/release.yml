name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v1.2.3 or 1.2.3'
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npm run compile

      - name: Prepare release metadata
        id: release
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            TAG_NAME="${VERSION#v}"
            TAG_NAME="v${TAG_NAME}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          TAG_VERSION="${TAG_NAME#v}"

          if [[ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]]; then
            echo "Release tag ${TAG_NAME} does not match package.json version ${PACKAGE_VERSION}"
            exit 1
          fi

          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_name=Infinity ${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "package_version=${PACKAGE_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build extension zip
        run: npm run zip

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find .output -type f -name '*.zip' -exec cp {} release-assets/ \;

          if [[ -z "$(find release-assets -type f -name '*.zip' -print -quit)" ]]; then
            echo "No zip assets found under .output"
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: ${{ steps.release.outputs.release_name }}
          files: release-assets/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
