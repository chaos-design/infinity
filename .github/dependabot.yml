version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    groups:
      development-tooling:
        patterns:
          - '@biomejs/*'
          - '@vitejs/*'
          - '@vitest/*'
          - typescript
          - vite
          - vitest
          - wxt
      react-ui:
        patterns:
          - react
          - react-dom
          - '@radix-ui/*'
          - lucide-react

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
