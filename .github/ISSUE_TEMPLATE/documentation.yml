name: Documentation
description: Report unclear docs or request documentation improvements.
title: '[Docs]: '
labels: ['documentation', 'needs triage']
body:
  - type: markdown
    attributes:
      value: |
        Use this template for README, contribution guide, release notes, setup instructions, or screenshot documentation issues.

  - type: textarea
    id: issue
    attributes:
      label: Documentation issue
      description: What is missing, outdated, unclear, or incorrect?
      placeholder: Describe the documentation problem.
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Documentation location
      description: Link to a file, section, heading, or URL.
      placeholder: README.md#开发手册
    validations:
      required: false

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      description: What should the documentation say instead?
      placeholder: Provide wording, structure, or examples if you have them.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I checked the latest README and existing issues first.
          required: true
